services:
  - type: web
    name: trading-rocket-api
    runtime: python311
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: ALLOWED_ORIGINS
        value: "https://td-fawn.vercel.app,http://localhost:3000"
      - key: DEBUG
        value: "false"