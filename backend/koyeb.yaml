app:
  name: trading-rocket-api
  region: eu

services:
  - name: api
    github:
      repo: codingyash9-bit/Trading-Rocket
      branch: main
      root_directory: backend
    build_command: pip install -r requirements.txt
    start_command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_vars:
      - key: ALLOWED_ORIGINS
        value: https://td-fawn.vercel.app,http://localhost:3000
      - key: DEBUG
        value: "false"
    ports:
      - 8000